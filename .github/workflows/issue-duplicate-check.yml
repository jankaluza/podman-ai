# On new issue: incremental sync from DB watermark → refresh target issue → duplicate check → comment.
# Manual run: workflow_dispatch with issue_number (and optional owner/repo).
#
# Fork support: set repository variables DEDUP_OWNER / DEDUP_REPO (e.g. containers / podman)
# so sync + Supabase use upstream while comments still post on the fork issue that triggered the run.

name: Check issue duplicate

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to check"
        required: true
        type: number
      owner:
        description: "Upstream owner for sync/DB (used if DEDUP_OWNER var unset)"
        default: containers
        type: string
      repo:
        description: "Upstream repo for sync/DB (used if DEDUP_REPO var unset)"
        default: podman
        type: string

jobs:
  duplicate-check:
    runs-on: ubuntu-latest
    # Serialize per upstream index (owner/repo used for Supabase), not per fork name.
    concurrency:
      group: duplicate-check-${{ vars.DEDUP_OWNER || (github.event_name == 'workflow_dispatch' && inputs.owner || github.repository_owner) }}-${{ vars.DEDUP_REPO || (github.event_name == 'workflow_dispatch' && inputs.repo || github.event.repository.name) }}
      cancel-in-progress: false
    permissions:
      issues: write
      contents: read
    env:
      # Upstream index: sync, Supabase, duplicate API (override via repo variables DEDUP_OWNER / DEDUP_REPO)
      OWNER: ${{ vars.DEDUP_OWNER || (github.event_name == 'workflow_dispatch' && inputs.owner || github.repository_owner) }}
      REPO: ${{ vars.DEDUP_REPO || (github.event_name == 'workflow_dispatch' && inputs.repo || github.event.repository.name) }}
      ISSUE_NUMBER: ${{ github.event_name == 'issues' && github.event.issue.number || inputs.issue_number }}
    steps:
      - name: Log configuration
        run: |
          echo "Upstream index (sync + Supabase): ${OWNER}/${REPO}"
          echo "Workflow repository (comments):   ${GITHUB_REPOSITORY}"
          echo "Issue number:                     ${ISSUE_NUMBER}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEDUP_TOOLING_REPO || github.repository }}
          path: ${{ vars.DEDUP_TOOLING_REPO && 'tooling' || '.' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ${{ vars.DEDUP_TOOLING_REPO && 'tooling/' || '' }}requirements-sync.txt

      - name: Sync GitHub issues (incremental, watermark from Supabase)
        env:
          GITHUB_TOKEN: ${{ secrets.SUPABASE_GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ROOT="${{ vars.DEDUP_TOOLING_REPO && 'tooling' || '.' }}"
          python "${ROOT}/scripts/sync_github_issues.py" \
            --owner "$OWNER" --repo "$REPO"

      - name: Sync target issue
        env:
          GITHUB_TOKEN: ${{ secrets.SUPABASE_GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ROOT="${{ vars.DEDUP_TOOLING_REPO && 'tooling' || '.' }}"
          python "${ROOT}/scripts/sync_github_issues.py" \
            --owner "$OWNER" --repo "$REPO" --issue "$ISSUE_NUMBER"

      - name: Call Supabase duplicate check
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DEDUP_FUNCTION_SECRET: ${{ secrets.DEDUP_FUNCTION_SECRET }}
        run: |
          RESP=$(curl -sf -X POST "${SUPABASE_URL}/functions/v1/check-duplicate" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-dedup-secret: ${DEDUP_FUNCTION_SECRET}" \
            -d "{\"owner\":\"${OWNER}\",\"repo\":\"${REPO}\",\"issue_number\":${ISSUE_NUMBER}}")
          echo "$RESP" | tee check-response.json
          DUP=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('duplicate_issue_id') or '')")
          REASON=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('reason',''))")
          URL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('duplicate_url') or '')")
          echo "duplicate_id=$DUP" >> "$GITHUB_OUTPUT"
          echo "reason<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REASON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "duplicate_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment on issue when duplicate suspected
        if: github.event_name == 'issues' && steps.check.outputs.duplicate_id != ''
        uses: actions/github-script@v7
        env:
          UPSTREAM_OWNER: ${{ env.OWNER }}
          UPSTREAM_REPO: ${{ env.REPO }}
        with:
          github-token: ${{ secrets.SUPABASE_GITHUB_TOKEN }}
          script: |
            const dup = '${{ steps.check.outputs.duplicate_id }}';
            const reason = `${{ steps.check.outputs.reason }}`;
            const url = '${{ steps.check.outputs.duplicate_url }}';
            const upstreamOwner = process.env.UPSTREAM_OWNER;
            const upstreamRepo = process.env.UPSTREAM_REPO;
            const link = url || `https://github.com/${upstreamOwner}/${upstreamRepo}/issues/${dup}`;
            const body = [
              '### Possible duplicate issue',
              '',
              `This issue may be a duplicate of **#${dup}** on [${upstreamOwner}/${upstreamRepo}](${link}).`,
              '',
              '**Why:** ' + reason,
              '',
              'If this is not a duplicate, please say so. This note was generated automatically (Gemini + issue index).',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
