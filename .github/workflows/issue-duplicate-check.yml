# On new issue: sync containers/podman → check opened issue (fork or upstream) → comment.
#
# Sync always uses containers/podman (never the fork). The issue under test is read from
# the repository that triggered the workflow and sent inline to check-duplicate.

name: Check issue duplicate

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to check (in this repository)"
        required: true
        type: number

jobs:
  duplicate-check:
    runs-on: ubuntu-latest
    concurrency:
      group: duplicate-check-containers-podman
      cancel-in-progress: false
    permissions:
      issues: write
      contents: read
    env:
      # Duplicate index + GitHub sync (fixed upstream; never the fork)
      INDEX_OWNER: containers
      INDEX_REPO: podman
      # Issue to check: repository where this workflow runs (fork on issues.opened)
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}
      ISSUE_NUMBER: ${{ github.event_name == 'issues' && github.event.issue.number || inputs.issue_number }}
    steps:
      - name: Log configuration
        run: |
          echo "Sync + duplicate index (always): ${INDEX_OWNER}/${INDEX_REPO}"
          echo "Issue to check:                  ${GITHUB_OWNER}/${GITHUB_REPO}#${ISSUE_NUMBER}"
          echo "Workflow repository (comments):  ${GITHUB_REPOSITORY}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DEDUP_TOOLING_REPO || github.repository }}
          path: ${{ vars.DEDUP_TOOLING_REPO && 'tooling' || '.' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ${{ vars.DEDUP_TOOLING_REPO && 'tooling/' || '' }}requirements-sync.txt

      - name: Sync GitHub issues to Supabase (containers/podman only)
        env:
          GITHUB_TOKEN: ${{ secrets.SUPABASE_GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ROOT="${{ vars.DEDUP_TOOLING_REPO && 'tooling' || '.' }}"
          python "${ROOT}/scripts/sync_github_issues.py" \
            --owner containers --repo podman

      - name: Call Supabase duplicate check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.SUPABASE_GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DEDUP_FUNCTION_SECRET: ${{ secrets.DEDUP_FUNCTION_SECRET }}
        run: |
          set -euo pipefail
          ROOT="${{ vars.DEDUP_TOOLING_REPO && 'tooling' || '.' }}"
          BASE_URL="${SUPABASE_URL%/}"

          python3 "${ROOT}/scripts/build_duplicate_check_payload.py" \
            --owner containers --repo podman --issue-number "$ISSUE_NUMBER" \
            --github-owner "$GITHUB_OWNER" --github-repo "$GITHUB_REPO" \
            > payload.json
          echo "Payload: $(wc -c < payload.json) bytes (fork issue → inline target)"
          python3 -c "import json; p=json.load(open('payload.json')); assert p.get('target',{}).get('title'), 'payload missing target.title — deploy latest check-duplicate'"

          HTTP_CODE=$(curl -sS -o check-response.json -w '%{http_code}' \
            -X POST "${BASE_URL}/functions/v1/check-duplicate" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-dedup-secret: ${DEDUP_FUNCTION_SECRET}" \
            -d @payload.json)
          echo "check-duplicate HTTP ${HTTP_CODE}"
          cat check-response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::check-duplicate returned HTTP ${HTTP_CODE}. If 404, redeploy: supabase functions deploy check-duplicate"
            exit 1
          fi

          DUP=$(python3 -c "import json; d=json.load(open('check-response.json')); print(d.get('duplicate_issue_id') or '')")
          REASON=$(python3 -c "import json; d=json.load(open('check-response.json')); print(d.get('reason',''))")
          URL=$(python3 -c "import json; d=json.load(open('check-response.json')); print(d.get('duplicate_url') or '')")
          echo "duplicate_id=$DUP" >> "$GITHUB_OUTPUT"
          echo "reason<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REASON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "duplicate_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment on issue when duplicate suspected
        if: github.event_name == 'issues' && steps.check.outputs.duplicate_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SUPABASE_GITHUB_TOKEN }}
          script: |
            const dup = '${{ steps.check.outputs.duplicate_id }}';
            const reason = `${{ steps.check.outputs.reason }}`;
            const url = '${{ steps.check.outputs.duplicate_url }}';
            const link = url || `https://github.com/containers/podman/issues/${dup}`;
            const body = [
              '### Possible duplicate issue',
              '',
              `This issue may be a duplicate of **#${dup}** on [containers/podman](${link}).`,
              '',
              '**Why:** ' + reason,
              '',
              'If this is not a duplicate, please say so. This note was generated automatically (Gemini + issue index).',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
